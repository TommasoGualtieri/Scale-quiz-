<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Music Master Pro</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --primary: #00d1b2; --accent: #3298dc; --text: #f0f0f0; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        html, body { 
            height: 100%; 
            margin: 0; 
            padding: 0; 
            background: var(--bg); 
            color: var(--text); 
            font-family: sans-serif; 
            overflow: hidden; /* Evita scroll della pagina intera */
        }

        /* Navigazione */
        nav { display: flex; background: #222; border-bottom: 1px solid #333; height: 45px; flex-shrink: 0; }
        nav button { flex: 1; background: none; border: none; color: #888; font-weight: bold; font-size: 12px; cursor: pointer; text-transform: uppercase; }
        nav button.active { color: var(--primary); border-bottom: 3px solid var(--primary); }

        /* Contenitore Pagine */
        #content { flex: 1; position: relative; height: calc(100% - 45px); }
        .page { display: none; height: 100%; width: 100%; flex-direction: column; }
        .page.active { display: flex; }

        /* --- PAGINA SCALE --- */
        #page-scales { padding: 8px; justify-content: space-between; }
        
        .header-stats { display: flex; justify-content: space-around; background: #2a2a2a; padding: 5px; border-radius: 8px; font-size: 13px; margin-bottom: 8px; }
        .val { color: #ffdd57; font-weight: bold; }

        .selectors { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        select { background: #333; color: white; padding: 10px; border: 1px solid #444; border-radius: 8px; font-size: 15px; width: 100%; }

        .question-zone { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #domanda { font-size: 2.2rem; font-weight: bold; margin: 0; }
        #feedback { font-size: 14px; margin-top: 5px; font-weight: bold; min-height: 18px; }

        .input-zone { background: var(--card); padding: 10px; border-radius: 12px; width: 100%; }
        input { width: 100%; padding: 12px; font-size: 18px; text-align: center; border-radius: 8px; border: 2px solid #444; margin-bottom: 8px; background: white; color: black; }
        
        .btn-row { display: flex; gap: 8px; margin-bottom: 8px; }
        .btn { flex: 1; padding: 14px; border-radius: 8px; border: none; font-weight: bold; color: white; text-transform: uppercase; font-size: 14px; }
        .btn-start { background: var(--primary); }
        .btn-check { background: var(--accent); }

        /* Piano 3 Ottave Compatto */
        #piano { display: flex; width: 100%; height: 30px; background: white; border-radius: 2px; position: relative; }
        .key { flex: 1; border: 0.1px solid rgba(0,0,0,0.1); height: 100%; }
        .key.black { background: #000; height: 60%; margin: 0 -1.5%; z-index: 2; }
        .key.mark-correct { background: #48c774 !important; }
        .key.mark-wrong { background: #f14668 !important; }

        /* --- PAGINA PROGRESSIONI --- */
        #page-progs { padding: 10px; overflow-y: auto !important; -webkit-overflow-scrolling: touch; }
        .prog-card { background: #252525; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--primary); }
        .prog-title { font-weight: bold; color: var(--primary); font-size: 13px; margin-bottom: 5px; }
        .prog-chords { font-size: 1.4rem; font-weight: bold; color: #fff; margin-bottom: 5px; }
        .prog-song { font-size: 0.8rem; color: #aaa; }
    </style>
</head>
<body>

<nav>
    <button id="btn-scales" class="active" onclick="switchPage('scales')">Scales Quiz</button>
    <button id="btn-progs" onclick="switchPage('progs')">Progressions</button>
</nav>

<div id="content">
    <div id="page-scales" class="page active">
        <div class="header-stats">
            <span>Streak: <span id="cur" class="val">0</span></span>
            <span>Best: <span id="best" class="val">0</span></span>
        </div>

        <div class="selectors">
            <select id="tonica">
                <option value="C">C</option><option value="C#">C#</option><option value="D">D</option><option value="Eb">Eb</option>
                <option value="E">E</option><option value="F">F</option><option value="F#">F#</option><option value="G">G</option>
                <option value="Ab">Ab</option><option value="A">A</option><option value="Bb">Bb</option><option value="B">B</option>
            </select>
            <select id="tipo">
                <option value="major">Major</option><option value="naturalMinor">Minor</option>
                <option value="harmonicMinor">Harmonic</option><option value="blues">Blues</option>
            </select>
        </div>

        <div class="question-zone">
            <div id="domanda">READY?</div>
            <div id="feedback"></div>
        </div>

        <div class="input-zone">
            <input type="text" id="risposta" placeholder="Type Note..." autocomplete="off">
            <div class="btn-row">
                <button class="btn btn-start" onclick="nuovaDomanda()">START</button>
                <button class="btn btn-check" onclick="verifica()">VERIFY</button>
            </div>
            <div id="piano"></div>
        </div>
    </div>

    <div id="page-progs" class="page">
        <h3 style="text-align:center; margin: 10px 0; color: var(--primary)">Progression Finder</h3>
        <select id="prog-key" onchange="genProgs()" style="margin-bottom: 15px;">
            <option value="C">C Major</option><option value="G">G Major</option><option value="D">D Major</option>
            <option value="A">A Major</option><option value="E">E Major</option><option value="F">F Major</option>
            <option value="Bb">Bb Major</option>
        </select>
        <div id="progs-list"></div>
        <div style="height: 50px;"></div> </div>
</div>

<script>
    function switchPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.querySelectorAll('nav button').forEach(btn => btn.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('btn-' + p).classList.add('active');
    }

    // SCALE LOGIC
    const nMap = {"C":0,"C#":1,"Db":1,"D":2,"D#":3,"Eb":3,"E":4,"F":5,"F#":6,"Gb":6,"G":7,"G#":8,"Ab":8,"A":9,"A#":10,"Bb":10,"B":11};
    const pats = {major:[0,2,4,5,7,9,11], naturalMinor:[0,2,3,5,7,8,10], harmonicMinor:[0,2,3,5,7,8,11], blues:[0,3,5,6,7,10]};
    let target = -1, score = 0, high = localStorage.getItem('best') || 0;
    document.getElementById('best').innerText = high;

    function nuovaDomanda() {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('mark-wrong'));
        const r = document.getElementById('tonica').value;
        const t = document.getElementById('tipo').value;
        const sc = pats[t].map(v => (nMap[r] + v) % 12);
        const idx = Math.floor(Math.random() * sc.length);
        target = sc[idx];
        document.getElementById('domanda').innerText = "Degree " + (idx+1);
        document.getElementById('feedback').innerText = "";
        document.getElementById('risposta').value = "";
        document.getElementById('risposta').focus();
    }

    function verifica() {
        const a = document.getElementById('risposta').value.trim().toUpperCase();
        if(nMap[a] === target) {
            score++; document.getElementById('feedback').innerText = "CORRECT! ✅";
            document.getElementById('feedback').style.color = "#48c774";
            if(score > high) { high = score; localStorage.setItem('best', high); document.getElementById('best').innerText = high; }
            document.getElementById('cur').innerText = score;
            setTimeout(nuovaDomanda, 800);
        } else {
            score = 0; document.getElementById('cur').innerText = 0;
            document.getElementById('feedback').innerText = "WRONG! ❌";
            document.getElementById('feedback').style.color = "#f14668";
            document.querySelectorAll(`.key[data-n="${target}"]`).forEach(k => k.classList.add('mark-wrong'));
        }
    }

    // PROGS LOGIC
    const lib = [
        { n: "Pop (I-V-vi-IV)", s: [0, 7, 9, 5], g: "Let It Be, Despacito" },
        { n: "Jazz (ii-V-I)", s: [2, 7, 0], g: "Autumn Leaves, Summertime" },
        { n: "Doo-Wop (I-vi-IV-V)", s: [0, 9, 5, 7], g: "Stand By Me" },
        { n: "Epic (vi-IV-I-V)", s: [9, 5, 0, 7], g: "Africa (Toto), Numb" }
    ];
    const v2n = ["C","C#","D","Eb","E","F","F#","G","Ab","A","Bb","B"];

    function genProgs() {
        const r = nMap[document.getElementById('prog-key').value];
        const list = document.getElementById('progs-list');
        list.innerHTML = "";
        lib.forEach(p => {
            const ch = p.s.map(step => v2n[(r + step) % 12]);
            list.innerHTML += `<div class="prog-card"><div class="prog-title">${p.n}</div><div class="prog-chords">${ch.join(" - ")}</div><div class="prog-song">Ex: ${p.g}</div></div>`;
        });
    }

    // PIANO 3 OCT
    const p = document.getElementById('piano');
    for(let o=0; o<3; o++) {
        for(let i=0; i<12; i++) {
            const k = document.createElement('div');
            k.className = [1,3,6,8,10].includes(i) ? 'key black' : 'key';
            k.dataset.n = i;
            p.appendChild(k);
        }
    }
    genProgs();
</script>
</body>
</html>
