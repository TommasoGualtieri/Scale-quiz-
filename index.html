<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Scale Master Challenge PRO</title>
    <style>
        :root { --bg-color: #1a1a1a; --container-color: #242424; --primary-color: #00d1b2; --accent-color: #3298dc; --correct-color: #48c774; --wrong-color: #f14668; --text-color: #f0f0f0; }
        body { font-family: 'Poppins', 'Segoe UI', sans-serif; background: radial-gradient(circle at center, #2c2c2c 0%, #121212 100%); color: var(--text-color); display: flex; justify-content: center; padding: 10px; margin: 0; min-height: 100vh; touch-action: manipulation; }
        .container { background-color: var(--container-color); padding: 15px; border-radius: 20px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); border: 1px solid #333; transition: transform 0.1s; }
        
        h1 { color: var(--primary-color); margin: 0 0 10px 0; font-size: 20px; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        h1 span { color: white; font-weight: normal; font-size: 14px; display: block; opacity: 0.8; }

        .score-board { display: flex; justify-content: space-around; background: linear-gradient(145deg, #2a2a2a, #202020); padding: 8px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #333; }
        .score-val { font-size: 22px; font-weight: bold; background: linear-gradient(to bottom, #fff 0%, #aaa 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
