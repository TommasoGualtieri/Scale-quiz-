<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Scale Master Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121212; color: white; display: flex; justify-content: center; padding: 15px; margin: 0; }
        .container { background-color: #1e1e1e; padding: 20px; border-radius: 20px; text-align: center; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .score-board { display: flex; justify-content: space-around; background: #2a2a2a; padding: 10px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #333; }
        .score-val { font-size: 22px; font-weight: bold; color: #00d1b2; }
        .score-label { font-size: 0.6rem; text-transform: uppercase; color: #888; }

        #timer-container { width: 100%; height: 6px; background: #333; border-radius: 3px; margin-bottom: 15px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: #ffdd57; transition: width 0.1s linear; }

        .mode-switch { background: #333; padding: 8px; border-radius: 10px; margin-bottom: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 0.9rem; }
        
        select, input, button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 10px; border: none; font-size: 16px; box-sizing: border-box; }
        select { background-color: #333; color: white; }
        input { background-color: white; color: black; font-weight: bold; text-align: center; }
        
        .btn-gen { background-color: #00d1b2; color: white; font-weight: bold; cursor: pointer; }
        .btn-check { background-color: #3298dc; color: white; font-weight: bold; }
        
        #domanda-box { background: #252525; padding: 15px; border-radius: 15px; margin: 10px 0; border: 1px solid #444; }
        #info-scala { font-size: 0.8rem; color: #00d1b2; height: 18px; font-weight: bold; text-transform: uppercase; }
        #domanda { font-size: 1.8rem; color: white; font-weight: bold; margin: 5px 0; }
        
        #feedback { font-weight: bold; margin-top: 10px; min-height: 25px; font-size: 1rem; }
        label { display: block; text-align: left; font-size: 0.7rem; color: #888; margin-top: 5px; }

        .switch { position: relative; display: inline-block; width: 34px; height: 18px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #555; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 12px; width: 12px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #00d1b2; }
        input:checked + .slider:before { transform: translateX(16px); }
    </style>
</head>
<body>

<div class="container">
    <div class="score-board">
        <div class="score-box">
            <span id="current-score" class="score-val">0</span>
            <span class="score-label">Streak</span>
        </div>
        <div class="score-box">
            <span id="high-score" class="score-val">0</span>
            <span class="score-label">Best</span>
        </div>
    </div>

    <div id="timer-container"><div id="timer-bar"></div></div>

    <div class="mode-switch">
        <span>Random Mode</span>
        <label class="switch"><input type="checkbox" id="random-mode"><span class="slider"></span></label>
    </div>

    <div id="settings-area">
        <select id="tonica">
            <option value="C">C</option><option value="C#">C# / Db</option>
            <option value="D">D</option><option value="D#">D# / Eb</option>
            <option value="E">E</option><option value="F">F</option><option value="F#">F# / Gb</option>
            <option value="G">G</option><option value="G#">G# / Ab</option>
            <option value="A">A</option><option value="A#">A# / Bb</option><option value="B">B</option>
        </select>
        <select id="tipo">
            <option value="major">Major Scale</option>
            <option value="naturalMinor">Natural Minor</option>
            <option value="harmonicMinor">Harmonic Minor</option>
            <option value="pentatonicMinor">Pentatonic Minor</option>
            <option value="blues">Blues Scale</option>
        </select>
    </div>

    <button class="btn-gen" id="btnGenera">NEW QUESTION</button>

    <div id="domanda-box">
        <div id="info-scala"></div>
        <div id="domanda">Ready?</div>
    </div>
    
    <input type="text" id="risposta" placeholder="Note (e.g. F#)" autocomplete="off" spellcheck="false">
    <button class="btn-check" id="btnCheck">VERIFY</button>
    <div id="feedback"></div>
</div>

<script>
    const noteMap = {
        "C": 0, "C#": 1, "DB": 1, "D": 2, "D#": 3, "EB": 3, "E": 4, "F": 5, 
        "F#": 6, "GB": 6, "G": 7, "G#": 8, "AB": 8, "A": 9, "A#": 10, "BB": 10, "B": 11
    };
    
    const enarmonici = {
        0: "C", 1: "C# / Db", 2: "D", 3: "D# / Eb", 4: "E", 5: "F",
        6: "F# / Gb", 7: "G", 8: "G# / Ab", 9: "A", 10: "A# / Bb", 11: "B"
    };

    const patterns = {
        major: [0, 2, 4, 5, 7, 9, 11],
        naturalMinor: [0, 2, 3, 5, 7, 8, 10],
        harmonicMinor: [0, 2, 3, 5, 7, 8, 11],
        pentatonicMinor: [0, 3, 5, 7, 10],
        blues: [0, 3, 5, 6, 7, 10]
    };

    let targetValue = -1, score = 0, timeLeft = 100, timerInterval = null;
    let highScore = localStorage.getItem('scaleHighScore') || 0;
    document.getElementById('high-score').innerText = highScore;

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    function playSound(freq, type) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type; osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.5);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.5);
    }

    function startTimer() {
        clearInterval(timerInterval);
        timeLeft = 100;
        timerInterval = setInterval(() => {
            timeLeft -= 1.5; // Velocità del timer
            document.getElementById("timer-bar").style.width = timeLeft + "%";
            if (timeLeft <= 0) {
                clearInterval(timerInterval);
                gameOver("TIME EXPIRED!");
            }
        }, 150);
    }

    function nuovaDomanda() {
        const isRandom = document.getElementById("random-mode").checked;
        let root, type;

        if (isRandom) {
            const keys = ["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
            root = keys[Math.floor(Math.random() * keys.length)];
            type = Object.keys(patterns)[Math.floor(Math.random() * Object.keys(patterns).length)];
        } else {
            root = document.getElementById("tonica").value.split(" ")[0];
            type = document.getElementById("tipo").value;
        }

        document.getElementById("info-scala").innerText = `${root} ${type}`;
        const currentScale = patterns[type].map(v => (noteMap[root.toUpperCase()] + v) % 12);
        const randIdx = Math.floor(Math.random() * currentScale.length);
        targetValue = currentScale[randIdx];

        document.getElementById("domanda").innerText = `Degree ${randIdx + 1}`;
        document.getElementById("feedback").innerText = "";
        document.getElementById("risposta").value = "";
        document.getElementById("risposta").focus();
        startTimer();
    }

    function verifica() {
        if (targetValue === -1) return;
        clearInterval(timerInterval);
        const userRes = document.getElementById("risposta").value.trim().toUpperCase();

        if (noteMap[userRes] === targetValue) {
            score++;
            playSound(880, 'sine');
            document.getElementById("feedback").innerText = "CORRECT! ✅";
            document.getElementById("feedback").style.color = "#48c774";
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('scaleHighScore', highScore);
                document.getElementById('high-score').innerText = highScore;
            }
            document.getElementById('current-score').innerText = score;
            setTimeout(nuovaDomanda, 800);
        } else {
            gameOver(`WRONG! It was ${enarmonici[targetValue]}`);
        }
    }

    function gameOver(msg) {
        playSound(220, 'sawtooth');
        score = 0;
        document.getElementById('current-score').innerText = score;
        document.getElementById("feedback").innerText = msg;
        document.getElementById("feedback").style.color = "#f14668";
        document.getElementById("timer-bar").style.width = "0%";
    }

    document.getElementById("btnGenera").addEventListener("click", nuovaDomanda);
    document.getElementById("btnCheck").addEventListener("click", verifica);
    document.getElementById("risposta").addEventListener("keypress", (e) => { if(e.key==="Enter") verifica(); });
</script>
</body>
</html>
